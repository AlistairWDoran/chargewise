services:
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    command: uvicorn chargewise.api.app:create_app --factory --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

# Volumes: SQLite lives under ./data (mapped into the backend container).
# On Azure this maps to an Azure Files share; swap DATABASE_URL for Postgres later.
