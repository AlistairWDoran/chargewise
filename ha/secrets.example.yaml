# ChargeWise — example secrets for Home Assistant
#
# Copy the relevant lines into your existing <config>/secrets.yaml and set the
# real values. Never commit your real secrets.yaml.

# Base URL of the running ChargeWise API (LAN IP or hostname of the host
# running uvicorn / the container). No trailing slash.
chargewise_summary_url: "http://192.168.1.50:8000/api/summary/lifetime"
chargewise_health_url: "http://192.168.1.50:8000/health"

# Only needed if the API runs with auth enabled (AUTH_DISABLED=false).
# On a LAN-only instance with AUTH_DISABLED=true, leave the Authorization
# header commented out in ha/packages/chargewise.yaml and ignore this.
chargewise_auth: "Bearer <token>"

chargewise_status_url: "http://192.168.1.50:8000/api/status"
